openapi: 3.1.0
info:
  title: FinChat API
  description: |
    WebSocket API
    
    **Реальное подключение**:  
    `wss://{host}/v0/channels?apikey=APIKEY`
    
    После установления WebSocket-соединения клиент **обязан** отправить первое сообщение `{hi}`.
    
    **В данной спецификации** каждое клиентское сообщение представлено как отдельный `POST`-запрос  
    для удобства документирования и генерации клиентов в Swagger / OpenAPI tools.
  version: "0.22.x"

servers:
  - url: wss://{host}/v0/channels
    description: FinChat WebSocket сервер
    variables:
      host:
        default: api.dev.finchat.club
        description: "Хост"

paths:
  /:
    get:
      summary: WebSocket соединение
      description: Установка WebSocket-соединения. Обязательно передавайте `apikey` или заголовок `X-Finchat-APIKey`.
      parameters:
        - in: query
          name: apikey
          schema:
            type: string
        - in: header
          name: X-Finchat-APIKey
          schema:
            type: string
      responses:
        '101':
          description: Switching Protocols — соединение успешно установлено
      x-websocket: true
      tags:
        - WebSocket
  /hi:
    post:
      tags: [Auth]
      summary: Handshake (первое обязательное сообщение)
      description: |
        Должно отправляться сразу после открытия WebSocket-соединения.
        Используется для согласования версии протокола и передачи клиентских параметров.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HiRequest'
            examples:
              simple:
                summary: Простой handshake
                value:
                  hi:
                    id: "1"
                    ver: "0.22"
                    ua: "GoClient/1.0 (linux)"
                    lang: "ru-RU"
      responses:
        '201':
          description: Успешный handshake
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HiSuccessResponse'
        'default':
          description: Ошибка или challenge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CtrlResponse'

  /acc:
    post:
      tags: [Auth]
      summary: Регистрация нового пользователя
      description: "Создание нового аккаунта (scheme: wordcolor)."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccRequest'
            examples:
              registerAndLogin:
                summary: Регистрация с автоматическим входом
                value:
                  acc:
                    id: "2"
                    user: "new"
                    scheme: "wordcolor"
                    secret: "YWRtaW46cGFzc3dvcmQ="  # base64("phone:word1word2color")
                    login: true
                    desc:
                      public:
                        fn: "Иван Иванов"
      responses:
        '200':
          description: Аккаунт успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        'default':
          description: Ошибка при регистрации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CtrlResponse'

  /login:
    post:
      tags: [Auth]
      summary: Авторизация пользователя
      description: Вход в существующий аккаунт (wordcolor, token и др.).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              basicLogin:
                summary: Логин по словам и цвету
                value:
                  login:
                    id: "3"
                    scheme: "wordcolor"
                    secret: "YWRtaW46cGFzc3dvcmQ="  # base64("phone:word1word2color")
      responses:
        '200':
          description: Успешная авторизация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '300':
          description: Требуется дополнительная верификация (challenge)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeResponse'
        'default':
          description: Ошибка авторизации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /get_words:
    post:
      tags: [ Auth ]
      summary: Получить два случайных слова для wordcolor
      description: |
        Возвращает два разных случайных слова.
        Используется на этапе регистрации аккаунта по схеме wordcolor.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetWordsRequest'
            examples:
              simple:
                summary: Запрос двух слов
                value:
                  get_words: { }
      responses:
        '200':
          description: Успешно возвращены два случайных слова
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWordsResponse'
        'default':
          description: Ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CtrlResponse'

  /get_colors:
    post:
      tags: [ Auth ]
      summary: Получить список разрешённых цветов
      description: |
        Возвращает список всех разрешённых цветов для схемы wordcolor.
        Используется для отображения пользователю выбора цвета при регистрации/авторизации.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetColorsRequest'
            examples:
              simple:
                summary: Запрос списка цветов
                value:
                  get_colors: { }
      responses:
        '200':
          description: Успешно возвращён список цветов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetColorsResponse'
        'default':
          description: Ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CtrlResponse'
  /check_unique:
    post:
      tags: [ Auth ]
      summary: Проверка зарегистрированного номера
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckLoginRequest'
      responses:
        '200':
          description: Номер свободен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckLoginResponse'
        '409':
          description: Номер занят
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckLoginResponse'
        'default':
          description: Ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CtrlResponse'
  /check_alias:
    post:
      tags: [ Auth ]
      summary: Проверка уникальности alias пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckAliasRequest'
            examples:
              simple:
                summary: Проверка alias
                value:
                  check_alias:
                    id: "4"
                    alias: "john"
      responses:
        '200':
          description: Alias свободен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckAliasResponse'
        '409':
          description: Alias занят
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckAliasResponse'
        'default':
          description: Ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CtrlResponse'
  /file/u:
    post:
      tags: [ Files ]
      summary: Получить presigned URL для direct upload
      description: |
        Возвращает одноразовую presigned-ссылку для загрузки файла напрямую в Object Storage.

        Требования:
        - media handler `s3_multibucket`
        - в конфиге `direct_upload: true`

        Инструкция по применению:
        1. Выполните этот запрос с `direct=true` и передайте один из параметров: `ext` либо `mime`; получите `ctrl.params.upload_url`, `ctrl.params.upload_method`, `ctrl.params.url`, `ctrl.params.cache_control`, `ctrl.params.content_type`.
        2. Загрузите файл по `upload_url` методом `upload_method` (`PUT`) как бинарный body:
           - `Content-Type` должен быть равен `content_type` из ответа
           - `Cache-Control` должен быть строго равен `cache_control` из ответа
           - не добавляйте auth-заголовки FinChat при PUT в storage
        3. Отправьте `{pub}` по WebSocket и укажите `ctrl.params.url` в контенте/вложении.
        4. Обязательно продублируйте этот же URL в `extra.attachments`, иначе файл может быть удален сборщиком мусора как неиспользуемый.
      parameters:
        - in: query
          name: direct
          required: true
          schema:
            type: boolean
            enum: [true]
          description: Включить режим direct upload через presigned URL
        - in: query
          name: mime
          required: false
          schema:
            type: string
            example: image/jpeg
          description: MIME-тип загружаемого файла. Используется, если не передан `extension`/`ext`.

        - in: query
          name: ext
          required: false
          schema:
            type: string
            example: jpg
          description: Расширение файла с точкой или без (`jpg` или `.jpg`). Имеет приоритет над `mime` и используется как суффикс в `ctrl.params.url`.
        - in: header
          name: X-Finchat-APIKey
          required: true
          schema:
            type: string
        - in: header
          name: X-Finchat-Auth
          required: true
          schema:
            type: string
          description: |
            Авторизация пользователя, например `Token <token>`.
      responses:
        '200':
          description: Presigned URL успешно выдан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedUploadResponse'
              examples:
                success:
                  summary: Ответ с данными для direct upload
                  value:
                    ctrl:
                      code: 200
                      text: "ok"
                      params:
                        url: "/v0/file/s/mfHLxDWFhfU.jpg"
                        upload_url: "https://bucket.storage.yandexcloud.net/2ezj66bddxnam?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-SignedHeaders=cache-control%3Bcontent-type%3Bhost&X-Amz-Signature=..."
                        upload_method: "PUT"
                        content_type: "image/jpeg"
                        cache_control: "max-age=86400"
                      ts: "2026-05-26T17:07:19.000Z"
        'default':
          description: Ошибка выдачи presigned URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CtrlResponse'
components:
  schemas:

    # ====================== ЗАПРОСЫ get_words и get_colors ======================

    GetWordsRequest:
      type: object
      description: Запрос двух случайных слов
      properties:
        get_words:
          type: object
          description: Пустой объект

    GetColorsRequest:
      type: object
      description: Запрос списка разрешённых цветов
      properties:
        get_colors:
          type: object
          description: Пустой объект

    # ====================== ОТВЕТЫ ======================

    GetWordsResponse:
      type: object
      properties:
        get_words:
          type: object
          properties:
            word1:
              type: string
              example: "солнце"
            word2:
              type: string
              example: "река"

    GetColorsResponse:
      type: object
      properties:
        get_colors:
          type: object
          properties:
            colors:
              type: array
              items:
                type: string
              example: [ "red", "orange", "yellow" ]

    # ====================== ЗАПРОСЫ КЛИЕНТА ======================

    HiRequest:
      type: object
      description: Handshake — первое сообщение после подключения
      properties:
        hi:
          type: object
          required: [ver]
          properties:
            id:
              type: string
              example: "1"
            ver:
              type: string
              example: "0.22"
            ua:
              type: string
              example: "GoClient/1.0 (linux)"
            dev:
              type: string
            platf:
              type: string
              enum: [android, ios, web]
            lang:
              type: string
              example: "ru-RU"

    AccRequest:
      type: object
      description: Создание нового аккаунта (регистрация)
      properties:
        acc:
          type: object
          required: [scheme, secret]
          properties:
            id:
              type: string
              example: "2"
            user:
              type: string
              default: "new"
            scheme:
              type: string
              enum: [wordcolor]
            secret:
              type: string
              description: base64("phone:word1word2color") для wordcolor
            login:
              type: boolean
              default: false
            desc:
              type: object
              properties:
                public:
                  type: object
                private:
                  type: object
                defacs:
                  type: object

    LoginRequest:
      type: object
      description: Авторизация пользователя
      properties:
        login:
          type: object
          required: [scheme, secret]
          properties:
            id:
              type: string
              example: "3"
            scheme:
              type: string
              enum: [wordcolor]
            secret:
              type: string
            cred:
              type: array
              items:
                $ref: '#/components/schemas/Credential'

    Credential:
      type: object
      properties:
        meth:
          type: string
          example: "email"
        val:
          type: string
        resp:
          type: string
          description: Ответ на challenge

    CheckLoginRequest:
      type: object
      description: Проверка логина
      properties:
        check_unique:
          type: object
          required: [ scheme, secret ]
          properties:
            id:
              type: string
              example: "3"
            scheme:
              type: string
              enum: [ wordcolor ]
            secret:
              type: string
              description: base64("phone") для wordcolor

    CheckAliasRequest:
      type: object
      description: Проверка доступности alias пользователя через websocket
      properties:
        check_alias:
          type: object
          required: [ alias ]
          properties:
            id:
              type: string
              example: "4"
            alias:
              type: string
              description: Alias без префикса или с префиксом `alias:`
              example: "john"
    # ====================== ОТВЕТЫ СЕРВЕРА ======================

    CtrlResponse:
      type: object
      required: [ctrl]
      properties:
        ctrl:
          type: object
          required: [code, text]
          properties:
            id:
              type: string
            topic:
              type: string
            code:
              type: integer
              example: 200
            text:
              type: string
              example: "OK"
            params:
              $ref: '#/components/schemas/CtrlParams'
            ts:
              type: string
              format: date-time

    CtrlParams:
      type: object
      properties:
        user:
          type: string
          description: UID пользователя
        token:
          type: string
          description: Авторизационный токен
        expires:
          type: string
          format: date-time
        ver:
          type: string
        build:
          type: string
        sid:
          type: string
        authlevel:
          type: string
          enum: [auth, anon]
        challenge:
          type: object
        url:
          type: string
          description: Относительный URL файла для последующей публикации и скачивания
          example: "/v0/file/s/mfHLxDWFhfU.jpg"
        upload_url:
          type: string
          description: Одноразовый presigned URL для загрузки файла напрямую в storage
        upload_method:
          type: string
          description: HTTP-метод для загрузки по `upload_url`
          example: "PUT"
        content_type:
          type: string
          description: Значение заголовка `Content-Type`, которое нужно передать при PUT в `upload_url`
          example: "image/jpeg"
        cache_control:
          type: string
          description: Значение заголовка `Cache-Control`, которое нужно передать при PUT в `upload_url`
          example: "no-cache, must-revalidate"

    PresignedUploadResponse:
      type: object
      properties:
        ctrl:
          type: object
          required: [code, text, params]
          properties:
            code:
              type: integer
              example: 200
            text:
              type: string
              example: "ok"
            params:
              type: object
              required: [url, upload_url, upload_method, content_type, cache_control]
              properties:
                url:
                  type: string
                  description: URL файла для использования в `{pub}` и `extra.attachments`
                upload_url:
                  type: string
                  description: Presigned URL для прямой загрузки в storage
                upload_method:
                  type: string
                  example: "PUT"
                content_type:
                  type: string
                  description: Обязательное значение `Content-Type` для PUT
                cache_control:
                  type: string
                  description: Обязательное значение `Cache-Control` для PUT
            ts:
              type: string
              format: date-time

    HiSuccessResponse:
      type: object
      properties:
        ctrl:
          type: object
          properties:
            code: { type: integer, example: 201 }
            text: { type: string, example: "OK" }
            params:
              type: object
              properties:
                ver: { type: string, example: "0.22" }
                build: { type: string, example: "finchat/0.22" }
            ts: { type: string, format: date-time }

    AuthSuccessResponse:
      type: object
      properties:
        ctrl:
          type: object
          properties:
            id: { type: string }
            code: { type: integer, example: 200 }
            text: { type: string, example: "OK" }
            params:
              type: object
              properties:
                user: { type: string, example: "usr2il9suCbuko" }
                token: { type: string }
                expires: { type: string, format: date-time }
            ts: { type: string, format: date-time }

    ChallengeResponse:
      type: object
      properties:
        ctrl:
          type: object
          properties:
            code: { type: integer, example: 300 }
            text: { type: string, example: "additional authentication required" }
            params:
              type: object
              properties:
                challenge:
                  type: object
                  properties:
                    meth: { type: string, example: "captcha" }
                    payload: { type: string }

    CheckLoginResponse:
      type: object
      properties:
        check_unique:
          type: object
          properties:
            id:
              type: string
              example: "3"
            unique:
              type: boolean
              description: Если `true`, значит свободен
            code:
              type: integer
              description: Статус ответа, 200 - свободен, 409 - занят

    CheckAliasResponse:
      type: object
      properties:
        check_alias:
          type: object
          properties:
            id:
              type: string
              example: "4"
            alias:
              type: string
              description: Нормализованный alias с namespace-префиксом
              example: "alias:john"
            available:
              type: boolean
              description: Если `true`, alias свободен
            code:
              type: integer
              description: Статус ответа, 200 - свободен, 409 - занят
            text:
              type: string
              example: "ok"

    ErrorResponse:
      type: object
      properties:
        ctrl:
          type: object
          properties:
            code: { type: integer, example: 401 }
            text: { type: string, example: "invalid login or password" }
            ts: { type: string, format: date-time }

  examples:
    HiSuccess:
      summary: Успешный handshake
      value:
        ctrl:
          code: 200
          text: "OK"
          params:
            ver: "0.22"
            build: "finchat/0.22"
          ts: "2026-03-27T10:00:00.000Z"

    AccLoginSuccess:
      summary: Регистрация + автоматический вход
      value:
        ctrl:
          id: "2"
          code: 200
          text: "OK"
          params:
            user: "usr2il9suCbuko"
            token: "XMgS...g1Gp8+BO0="
            expires: "2026-04-27T10:00:00.000Z"
          ts: "2026-03-27T10:00:00.000Z"

    LoginSuccess:
      summary: Успешный логин
      value:
        ctrl:
          id: "3"
          code: 200
          text: "OK"
          params:
            user: "usr2il9suCbuko"
            token: "XMgS...g1Gp8+BO0="
            expires: "2026-04-27T10:00:00.000Z"
          ts: "2026-03-27T10:00:00.000Z"

tags:
  - name: WebSocket
    description: WebSocket соединение и формат сообщений
  - name: Auth
    description: Handshake, регистрация и авторизация пользователей
  - name: Files
    description: Загрузка и работа с файлами (direct upload через presigned URL)
