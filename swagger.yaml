openapi: 3.0.4
info:
  title: FinChat API
  description: |
    WebSocket API
    
    **Реальное подключение**:  
    `wss://{host}/v0/channels?apikey=APIKEY`
    
    После установления WebSocket-соединения клиент **обязан** отправить первое сообщение `{hi}`.
    
    **В данной спецификации** каждое клиентское сообщение представлено как отдельный `POST`-запрос  
    для удобства документирования и генерации клиентов в Swagger / OpenAPI tools.
  version: "0.22.x"

servers:
  - url: wss://{host}/v0/channels
    description: FinChat WebSocket сервер
    variables:
      host:
        default: api.dev.finchat.club
        description: "Хост"

paths:
  /:
    get:
      summary: WebSocket соединение
      description: Установка WebSocket-соединения. Обязательно передавайте `apikey` или заголовок `X-Finchat-APIKey`.
      parameters:
        - in: query
          name: apikey
          schema:
            type: string
        - in: header
          name: X-Finchat-APIKey
          schema:
            type: string
      responses:
        '101':
          description: Switching Protocols — соединение успешно установлено
      x-websocket: true
      tags:
        - WebSocket
  /hi:
    post:
      tags: [Auth]
      summary: Handshake (первое обязательное сообщение)
      description: |
        Должно отправляться сразу после открытия WebSocket-соединения.
        Используется для согласования версии протокола и передачи клиентских параметров.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HiRequest'
            examples:
              simple:
                summary: Простой handshake
                value:
                  hi:
                    id: "1"
                    ver: "0.22"
                    ua: "GoClient/1.0 (linux)"
                    lang: "ru-RU"
      responses:
        '201':
          description: Успешный handshake
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HiSuccessResponse'
        'default':
          description: Ошибка или challenge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CtrlResponse'

  /acc:
    post:
      tags: [Auth]
      summary: Регистрация нового пользователя
      description: "Создание нового аккаунта (scheme: wordcolor)."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccRequest'
            examples:
              registerAndLogin:
                summary: Регистрация с автоматическим входом
                value:
                  acc:
                    id: "2"
                    user: "new"
                    scheme: "wordcolor"
                    secret: "YWRtaW46cGFzc3dvcmQ="  # base64("phone:word1word2color")
                    login: true
                    desc:
                      public:
                        fn: "Иван Иванов"
      responses:
        '200':
          description: Аккаунт успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        'default':
          description: Ошибка при регистрации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CtrlResponse'

  /login:
    post:
      tags: [Auth]
      summary: Авторизация пользователя
      description: Вход в существующий аккаунт (wordcolor, token и др.).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              basicLogin:
                summary: Логин по словам и цвету
                value:
                  login:
                    id: "3"
                    scheme: "wordcolor"
                    secret: "YWRtaW46cGFzc3dvcmQ="  # base64("phone:word1word2color")
      responses:
        '200':
          description: Успешная авторизация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '300':
          description: Требуется дополнительная верификация (challenge)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeResponse'
        'default':
          description: Ошибка авторизации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /get_words:
    post:
      tags: [ Auth ]
      summary: Получить два случайных слова для wordcolor
      description: |
        Возвращает два разных случайных слова.
        Используется на этапе регистрации аккаунта по схеме wordcolor.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetWordsRequest'
            examples:
              simple:
                summary: Запрос двух слов
                value:
                  get_words: { }
      responses:
        '200':
          description: Успешно возвращены два случайных слова
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWordsResponse'
        'default':
          description: Ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CtrlResponse'

  /get_colors:
    post:
      tags: [ Auth ]
      summary: Получить список разрешённых цветов
      description: |
        Возвращает список всех разрешённых цветов для схемы wordcolor.
        Используется для отображения пользователю выбора цвета при регистрации/авторизации.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetColorsRequest'
            examples:
              simple:
                summary: Запрос списка цветов
                value:
                  get_colors: { }
      responses:
        '200':
          description: Успешно возвращён список цветов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetColorsResponse'
        'default':
          description: Ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CtrlResponse'
  /check_unique:
    post:
      tags: [ Auth ]
      summary: Проверка зарегистрированного номера
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckLoginRequest'
      responses:
        '200':
          description: Номер свободен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckLoginResponse'
        '409':
          description: Номер занят
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckLoginResponse'
        'default':
          description: Ошибка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CtrlResponse'
components:
  schemas:

    # ====================== ЗАПРОСЫ get_words и get_colors ======================

    GetWordsRequest:
      type: object
      description: Запрос двух случайных слов
      properties:
        get_words:
          type: object
          description: Пустой объект

    GetColorsRequest:
      type: object
      description: Запрос списка разрешённых цветов
      properties:
        get_colors:
          type: object
          description: Пустой объект

    # ====================== ОТВЕТЫ ======================

    GetWordsResponse:
      type: object
      properties:
        get_words:
          type: object
          properties:
            word1:
              type: string
              example: "солнце"
            word2:
              type: string
              example: "река"

    GetColorsResponse:
      type: object
      properties:
        get_colors:
          type: object
          properties:
            colors:
              type: array
              items:
                type: string
              example: [ "red", "orange", "yellow" ]

    # ====================== ЗАПРОСЫ КЛИЕНТА ======================

    HiRequest:
      type: object
      description: Handshake — первое сообщение после подключения
      properties:
        hi:
          type: object
          required: [ver]
          properties:
            id:
              type: string
              example: "1"
            ver:
              type: string
              example: "0.22"
            ua:
              type: string
              example: "GoClient/1.0 (linux)"
            dev:
              type: string
            platf:
              type: string
              enum: [android, ios, web]
            lang:
              type: string
              example: "ru-RU"

    AccRequest:
      type: object
      description: Создание нового аккаунта (регистрация)
      properties:
        acc:
          type: object
          required: [scheme, secret]
          properties:
            id:
              type: string
              example: "2"
            user:
              type: string
              default: "new"
            scheme:
              type: string
              enum: [wordcolor]
            secret:
              type: string
              description: base64("phone:word1word2color") для wordcolor
            login:
              type: boolean
              default: false
            desc:
              type: object
              properties:
                public:
                  type: object
                private:
                  type: object
                defacs:
                  type: object

    LoginRequest:
      type: object
      description: Авторизация пользователя
      properties:
        login:
          type: object
          required: [scheme, secret]
          properties:
            id:
              type: string
              example: "3"
            scheme:
              type: string
              enum: [wordcolor]
            secret:
              type: string
            cred:
              type: array
              items:
                $ref: '#/components/schemas/Credential'

    Credential:
      type: object
      properties:
        meth:
          type: string
          example: "email"
        val:
          type: string
        resp:
          type: string
          description: Ответ на challenge

    CheckLoginRequest:
      type: object
      description: Проверка логина
      properties:
        login:
          type: object
          required: [ scheme, secret ]
          properties:
            id:
              type: string
              example: "3"
            scheme:
              type: string
              enum: [ wordcolor ]
            secret:
              type: string
              description: base64("phone") для wordcolor
    # ====================== ОТВЕТЫ СЕРВЕРА ======================

    CtrlResponse:
      type: object
      required: [ctrl]
      properties:
        ctrl:
          type: object
          required: [code, text]
          properties:
            id:
              type: string
            topic:
              type: string
            code:
              type: integer
              example: 200
            text:
              type: string
              example: "OK"
            params:
              $ref: '#/components/schemas/CtrlParams'
            ts:
              type: string
              format: date-time

    CtrlParams:
      type: object
      properties:
        user:
          type: string
          description: UID пользователя
        token:
          type: string
          description: Авторизационный токен
        expires:
          type: string
          format: date-time
        ver:
          type: string
        build:
          type: string
        sid:
          type: string
        authlevel:
          type: string
          enum: [auth, anon]
        challenge:
          type: object

    HiSuccessResponse:
      type: object
      properties:
        ctrl:
          type: object
          properties:
            code: { type: integer, example: 201 }
            text: { type: string, example: "OK" }
            params:
              type: object
              properties:
                ver: { type: string, example: "0.22" }
                build: { type: string, example: "finchat/0.22" }
            ts: { type: string, format: date-time }

    AuthSuccessResponse:
      type: object
      properties:
        ctrl:
          type: object
          properties:
            id: { type: string }
            code: { type: integer, example: 200 }
            text: { type: string, example: "OK" }
            params:
              type: object
              properties:
                user: { type: string, example: "usr2il9suCbuko" }
                token: { type: string }
                expires: { type: string, format: date-time }
            ts: { type: string, format: date-time }

    ChallengeResponse:
      type: object
      properties:
        ctrl:
          type: object
          properties:
            code: { type: integer, example: 300 }
            text: { type: string, example: "additional authentication required" }
            params:
              type: object
              properties:
                challenge:
                  type: object
                  properties:
                    meth: { type: string, example: "captcha" }
                    payload: { type: string }

    CheckLoginResponse:
      type: object
      properties:
        check_unique:
          type: object
          properties:
            id:
              type: string
              example: "3"
            unique:
              type: boolean
              description: Если `true`, значит свободен
            code:
              type: integer
              description: Статус ответа, 200 - свободен, 409 - занят

    ErrorResponse:
      type: object
      properties:
        ctrl:
          type: object
          properties:
            code: { type: integer, example: 401 }
            text: { type: string, example: "invalid login or password" }
            ts: { type: string, format: date-time }

  examples:
    HiSuccess:
      summary: Успешный handshake
      value:
        ctrl:
          code: 200
          text: "OK"
          params:
            ver: "0.22"
            build: "finchat/0.22"
          ts: "2026-03-27T10:00:00.000Z"

    AccLoginSuccess:
      summary: Регистрация + автоматический вход
      value:
        ctrl:
          id: "2"
          code: 200
          text: "OK"
          params:
            user: "usr2il9suCbuko"
            token: "XMgS...g1Gp8+BO0="
            expires: "2026-04-27T10:00:00.000Z"
          ts: "2026-03-27T10:00:00.000Z"

    LoginSuccess:
      summary: Успешный логин
      value:
        ctrl:
          id: "3"
          code: 200
          text: "OK"
          params:
            user: "usr2il9suCbuko"
            token: "XMgS...g1Gp8+BO0="
            expires: "2026-04-27T10:00:00.000Z"
          ts: "2026-03-27T10:00:00.000Z"

tags:
  - name: WebSocket
    description: WebSocket соединение и формат сообщений
  - name: Auth
    description: Handshake, регистрация и авторизация пользователей
